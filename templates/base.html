{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cadastro Civil{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <h1>Cadastro Civil</h1>
        <nav>
            <a href="{% url 'core:pavimento_list' %}">Pavimentos</a>
            <a href="{% url 'core:pavimento_create' %}">Novo pavimento</a>
        </nav>
    </header>

    <main>
        {% if messages %}
            {% for message in messages %}
                <div class="mensagem {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {% now "Y" %} Cadastro Civil</p>
    </footer>
</body>
</html>
